<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>水果合成大作战</title>
<style>
/* ===== 全局重置 & 布局 ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  overflow: hidden;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

/* ===== 游戏容器 ===== */
#game-container {
  position: relative;
  width: 100%;
  max-width: 420px;
  aspect-ratio: 420 / 760;
  background: radial-gradient(ellipse at 50% 0%, #1a1a3e 0%, #0d0d24 60%, #060612 100%);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(100, 60, 255, 0.15), inset 0 0 80px rgba(0,0,0,0.5);
}

/* ===== Canvas ===== */
#gameCanvas {
  display: block;
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
}

/* ===== Game Over 蒙层 (唯一使用 glassmorphism 的地方) ===== */
#gameOverlay {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 10;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(0, 0, 0, 0.35);
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  animation: fadeIn 0.4s ease;
}

#gameOverlay.active {
  display: flex;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

#gameOverlay .overlay-title {
  font-size: 32px;
  font-weight: 800;
  color: #ff4757;
  text-shadow: 0 0 30px rgba(255, 71, 87, 0.6);
  margin-bottom: 12px;
  letter-spacing: 2px;
}

#gameOverlay .overlay-score {
  font-size: 18px;
  color: rgba(255,255,255,0.7);
  margin: 4px 0;
  letter-spacing: 1px;
}

#gameOverlay .overlay-score span {
  color: #ffd700;
  font-size: 26px;
  font-weight: 700;
}

#gameOverlay .overlay-high {
  font-size: 14px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 24px;
}

#gameOverlay .overlay-combo {
  font-size: 13px;
  color: rgba(255, 215, 0, 0.5);
  margin-bottom: 20px;
}

#restartBtn {
  padding: 14px 48px;
  font-size: 18px;
  font-weight: 700;
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  color: #fff;
  cursor: pointer;
  letter-spacing: 2px;
  box-shadow: 0 8px 30px rgba(238, 90, 36, 0.4);
  transition: transform 0.15s, box-shadow 0.15s;
  font-family: inherit;
}

#restartBtn:active {
  transform: scale(0.95);
}

/* ===== 暂停按钮 (Canvas 之外) ===== */
#pauseBtn {
  position: absolute;
  top: 10px;
  right: 14px;
  z-index: 5;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  width: 36px;
  height: 36px;
  color: rgba(255,255,255,0.6);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  -webkit-tap-highlight-color: transparent;
  font-family: inherit;
}

#pauseBtn:hover { background: rgba(255,255,255,0.15); }
#pauseBtn:active { background: rgba(255,255,255,0.08); }

/* ===== 动画星星背景 (通过伪元素实现) ===== */
#game-container::before {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 30% 5%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 70% 15%, rgba(255,255,255,0.25), transparent),
    radial-gradient(1px 1px at 90% 8%, rgba(255,255,255,0.35), transparent),
    radial-gradient(1.5px 1.5px at 15% 35%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 45% 28%, rgba(255,255,255,0.2), transparent),
    radial-gradient(1px 1px at 80% 40%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 5% 55%, rgba(255,255,255,0.25), transparent),
    radial-gradient(1.5px 1.5px at 60% 50%, rgba(255,255,255,0.15), transparent),
    radial-gradient(1px 1px at 35% 65%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 75% 70%, rgba(255,255,255,0.2), transparent),
    radial-gradient(1.5px 1.5px at 20% 80%, rgba(255,255,255,0.35), transparent),
    radial-gradient(1px 1px at 55% 85%, rgba(255,255,255,0.25), transparent),
    radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 65% 90%, rgba(255,255,255,0.2), transparent),
    radial-gradient(1px 1px at 40% 45%, rgba(255,255,255,0.15), transparent),
    radial-gradient(1.5px 1.5px at 92% 25%, rgba(255,255,255,0.3), transparent);
}
</style>
</head>
<body>

<div id="game-container">
  <canvas id="gameCanvas"></canvas>
  <button id="pauseBtn">⏸</button>
  <div id="gameOverlay">
    <div class="overlay-title">游戏结束</div>
    <div class="overlay-score">得分 <span id="finalScore">0</span></div>
    <div class="overlay-high">最高纪录 <span id="finalHigh">0</span></div>
    <div class="overlay-combo" id="finalCombo"></div>
    <button id="restartBtn">再来一局</button>
  </div>
</div>

<script>
/*
 * 水果合成大作战 — Suika Game 风格
 * 单文件完整实现
 */

// ============================================================
// 常量 & 配置
// ============================================================

/** 水果等级定义：[名称, emoji, 半径, 颜色(用于粒子), 基础分数] */
const FRUIT_TYPES = [
  ['葡萄', '🍇', 14, '#8b5cf6', 1],
  ['樱桃', '🍒', 20, '#e74c3c', 2],
  ['橘子', '🍊', 26, '#f39c12', 4],
  ['柠檬', '🍋', 32, '#f1c40f', 8],
  ['猕猴桃', '🥝', 38, '#27ae60', 16],
  ['番茄', '🍅', 44, '#e74c3c', 32],
  ['桃子', '🍑', 52, '#fd79a8', 64],
  ['菠萝', '🍍', 60, '#f0932b', 128],
  ['椰子', '🥥', 70, '#7f8c8d', 256],
  ['半个西瓜', '🍉', 82, '#2ecc71', 512],
  ['西瓜', '🍉', 96, '#27ae60', 1024],
];

const CANVAS_W = 420;  // 逻辑宽度 px
const CANVAS_H = 760;  // 逻辑高度 px

// 物理世界边界 (墙壁)
const WALL_LEFT  = 20;
const WALL_RIGHT = CANVAS_W - 20;

// 危险线 Y (顶部禁区)
const DANGER_Y = 130;

// 掉落生成位置
const DROP_Y = 80;

// 重力 (像素/帧²)
const GRAVITY = 0.45;

// 碰撞弹性系数
const RESTITUTION = 0.3;
const FRICTION = 0.02;

// 合并超时 (combo 窗口) ms
const COMBO_WINDOW = 2000;

// 生成水果等级范围 (0-4, 倾向小的)
const SPAWN_MIN = 0;
const SPAWN_MAX = 4;

// 每帧时间步
const DT = 1;

// ============================================================
// DOM 引用
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('gameOverlay');
const finalScoreEl = document.getElementById('finalScore');
const finalHighEl = document.getElementById('finalHigh');
const finalComboEl = document.getElementById('finalCombo');
const restartBtn = document.getElementById('restartBtn');
const pauseBtn = document.getElementById('pauseBtn');

// ============================================================
// dPR 缩放 — Canvas buffer = 逻辑×2 保证 Retina 清晰
// ============================================================
const dpr = window.devicePixelRatio || 1;
const SCALE = Math.min(dpr, 2); // 最多 2x 避免性能问题

canvas.width  = CANVAS_W * SCALE;
canvas.height = CANVAS_H * SCALE;
ctx.scale(SCALE, SCALE);

// 坐标转换: 将 DOM 事件坐标 → 画布逻辑坐标 (适配 dPR)
function canvasCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CANVAS_W / rect.width;
  const scaleY = CANVAS_H / rect.height;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY,
  };
}

// ============================================================
// 游戏状态
// ============================================================
let fruits = [];
let particles = [];
let scorePopups = [];
let stars = [];

let score = 0;
let highScore = parseInt(localStorage.getItem('fruitmerge_high') || '0', 10);
let gameOver = false;
let paused = false;

// 下次要掉落的水果等级
let nextFruitLevel = -1;

// 当前准备掉落的水果 (跟随指针)
let currentDropLevel = -1;
let pointerX = CANVAS_W / 2;

// Combo
let comboCount = 0;
let comboTimer = 0; // ms 计时
let lastMergeTime = 0;

// 屏幕 shake
let shakeIntensity = 0;

// 音频上下文 (延迟初始化)
let audioCtx = null;

// ============================================================
// 星星背景 (动态生成)
// ============================================================
function initStars() {
  stars = [];
  for (let i = 0; i < 40; i++) {
    stars.push({
      x: Math.random() * CANVAS_W,
      y: Math.random() * CANVAS_H,
      r: 0.3 + Math.random() * 0.7,
      a: 0.2 + Math.random() * 0.5,
      speed: 0.002 + Math.random() * 0.005,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

function drawStars(time) {
  for (const s of stars) {
    const alpha = s.a * (0.6 + 0.4 * Math.sin(time * s.speed + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  }
}

// ============================================================
// 物理引擎
// ============================================================

/** 两圆是否碰撞 */
function circlesCollide(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  return dist < a.r + b.r;
}

/** 应用重力 */
function applyGravity(f) {
  f.vy += GRAVITY * DT;
}

/** 更新水果位置 (半隐式欧拉) */
function updatePosition(f) {
  f.x += f.vx * DT;
  f.y += f.vy * DT;
  // 阻尼
  f.vx *= (1 - FRICTION);
  f.vy *= (1 - FRICTION * 0.5);
}

/** 墙壁碰撞 & 地面 */
function wallCollision(f) {
  // 左墙
  if (f.x - f.r < WALL_LEFT) {
    f.x = WALL_LEFT + f.r;
    f.vx = -f.vx * RESTITUTION;
  }
  // 右墙
  if (f.x + f.r > WALL_RIGHT) {
    f.x = WALL_RIGHT - f.r;
    f.vx = -f.vx * RESTITUTION;
  }
  // 地面 (底部)
  const floor = CANVAS_H - 10;
  if (f.y + f.r > floor) {
    f.y = floor - f.r;
    f.vy = -f.vy * RESTITUTION;
    // 摩擦停稳
    if (Math.abs(f.vy) < 0.5) f.vy = 0;
    // 如果已经躺着不动了就标记 grounded
    if (Math.abs(f.vy) < 0.3 && Math.abs(f.vx) < 0.3) {
      f.grounded = true;
    }
  }

  // 天花板反弹 (防止穿出)
  if (f.y - f.r < 0) {
    f.y = f.r;
    f.vy = -f.vy * RESTITUTION;
  }
}

/** 球-球碰撞响应 + 合并检测 */
function handleFruitCollisions() {
  const toRemove = new Set();
  const merges = []; // [{i, j, level}]

  for (let i = 0; i < fruits.length; i++) {
    if (toRemove.has(i)) continue;
    const a = fruits[i];
    for (let j = i + 1; j < fruits.length; j++) {
      if (toRemove.has(j)) continue;
      const b = fruits[j];

      if (!circlesCollide(a, b)) continue;

      // 相同等级 → 合并
      if (a.level === b.level && a.level < FRUIT_TYPES.length - 1) {
        toRemove.add(i);
        toRemove.add(j);
        merges.push({
          i, j,
          level: a.level,
          x: (a.x + b.x) / 2,
          y: (a.y + b.y) / 2,
          vx: (a.vx + b.vx) * 0.3,
          vy: (a.vy + b.vy) * 0.3,
        });
        break; // a 已被标记，跳过内层
      } else {
        // 普通弹性碰撞
        resolveCollision(a, b);
      }
    }
  }

  // 执行合并
  for (const m of merges) {
    // 创建高级水果
    const newLevel = m.level + 1;
    const nt = FRUIT_TYPES[newLevel];
    fruits.push({
      level: newLevel,
      x: m.x, y: m.y,
      vx: m.vx, vy: m.vy,
      r: nt[2],
      grounded: false,
    });

    // 添加粒子爆炸
    spawnParticles(m.x, m.y, nt[3], nt[2], 30 + newLevel * 3);

    // 计分
    const baseScore = nt[4];
    const combo = updateCombo();
    const finalPts = baseScore * combo;
    score += finalPts;

    // 分数弹出
    scorePopups.push({
      x: m.x + (Math.random() - 0.5) * 30,
      y: m.y - 10,
      text: `+${finalPts}`,
      combo: combo > 1 ? `x${combo}` : '',
      life: 1.0,
      vy: -1.8,
    });

    // 屏幕 shake (强度随等级递增)
    shakeIntensity = Math.max(shakeIntensity, Math.min(8, 2 + newLevel * 1.2));

    // 音效 (音高随等级上升)
    playMergeSound(newLevel);
  }

  // 移除已合并的水果
  if (toRemove.size > 0) {
    fruits = fruits.filter((_, idx) => !toRemove.has(idx));
  }
}

/** 弹性碰撞解析 (质量 = r²) */
function resolveCollision(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist === 0) return; // 避免除零

  const nx = dx / dist;
  const ny = dy / dist;

  // 质量 (用半径平方近似)
  const ma = a.r * a.r;
  const mb = b.r * b.r;
  const totalMass = ma + mb;

  // 位置修正 (穿透分离)
  const overlap = a.r + b.r - dist;
  if (overlap > 0) {
    const correction = overlap / 2;
    a.x -= nx * correction;
    a.y -= ny * correction;
    b.x += nx * correction;
    b.y += ny * correction;
  }

  // 相对速度沿法线方向
  const dvx = a.vx - b.vx;
  const dvy = a.vy - b.vy;
  const relVn = dvx * nx + dvy * ny;

  if (relVn > 0) return; // 正在分离

  const impulse = -(1 + RESTITUTION) * relVn / totalMass;

  a.vx += impulse * mb * nx;
  a.vy += impulse * mb * ny;
  b.vx -= impulse * ma * nx;
  b.vy -= impulse * ma * ny;

  // 防止累积微小抖动
  const minV = 0.05;
  if (Math.abs(a.vx) < minV) a.vx = 0;
  if (Math.abs(a.vy) < minV) a.vy = 0;
  if (Math.abs(b.vx) < minV) b.vx = 0;
  if (Math.abs(b.vy) < minV) b.vy = 0;
}

// ============================================================
// Combo 系统
// ============================================================
function updateCombo() {
  const now = performance.now();
  if (now - lastMergeTime < COMBO_WINDOW && lastMergeTime > 0) {
    comboCount++;
  } else {
    comboCount = 1;
  }
  lastMergeTime = now;
  comboTimer = COMBO_WINDOW;
  return comboCount;
}

// ============================================================
// 粒子系统
// ============================================================
function spawnParticles(x, y, color, radius, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    const size = 1.5 + Math.random() * (radius * 0.15);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed * (0.5 + Math.random()),
      vy: Math.sin(angle) * speed * (0.5 + Math.random()) - 1,
      r: Math.max(1, size),
      life: 0.7 + Math.random() * 0.3,
      decay: 0.008 + Math.random() * 0.015,
      color,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06; // 粒子重力
    p.life -= p.decay;
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = Math.max(0, p.life);
    ctx.beginPath();
    // 发光光晕
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 2);
    grad.addColorStop(0, p.color + 'ff');
    grad.addColorStop(0.4, p.color + Math.floor(alpha * 180).toString(16).padStart(2, '0'));
    grad.addColorStop(1, p.color + '00');
    ctx.fillStyle = grad;
    ctx.arc(p.x, p.y, p.r * 2, 0, Math.PI * 2);
    ctx.fill();

    // 核心亮点
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.6})`;
    ctx.fill();
  }
}

// ============================================================
// 分数弹出
// ============================================================
function updateScorePopups() {
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const p = scorePopups[i];
    p.y += p.vy;
    p.vy *= 0.97;
    p.life -= 0.015;
    if (p.life <= 0) {
      scorePopups.splice(i, 1);
    }
  }
}

function drawScorePopups() {
  for (const p of scorePopups) {
    const alpha = Math.max(0, p.life);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${22 + Math.min(8, p.combo ? 8 : 0)}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';

    // 阴影
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 6;

    // 主文字
    if (p.combo) {
      ctx.fillStyle = '#ffd700';
      ctx.fillText(`${p.text} ${p.combo}`, p.x, p.y);
      // combo 装饰
      ctx.shadowBlur = 12;
      ctx.shadowColor = 'rgba(255, 215, 0, 0.3)';
      ctx.font = `bold 14px -apple-system, sans-serif`;
      ctx.fillStyle = '#ffec8b';
      ctx.fillText('COMBO!', p.x, p.y - 28);
    } else {
      ctx.fillStyle = '#fff';
      ctx.fillText(p.text, p.x, p.y);
    }
    ctx.restore();
  }
}

// ============================================================
// 音频 (Web Audio API)
// ============================================================
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playDropSound() {
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.15);
  } catch(e) { /* 静默 */ }
}

function playMergeSound(level) {
  try {
    initAudio();
    const baseFreq = 400 + level * 80;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.2);

    // 第二泛音层
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(baseFreq * 2, audioCtx.currentTime);
    gain2.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    osc2.start(audioCtx.currentTime);
    osc2.stop(audioCtx.currentTime + 0.15);
  } catch(e) { /* 静默 */ }
}

function playGameOverSound() {
  try {
    initAudio();
    const notes = [400, 350, 300, 200];
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.2);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.2);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.2 + 0.3);
      osc.start(audioCtx.currentTime + i * 0.2);
      osc.stop(audioCtx.currentTime + i * 0.2 + 0.3);
    });
  } catch(e) { /* 静默 */ }
}

// ============================================================
// 水果生成
// ============================================================
/** 生成随机水果等级 (0-4, 加权更小) */
function randomSpawnLevel() {
  // 权重: [30, 25, 20, 15, 10]
  const weights = [30, 25, 20, 15, 10];
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < weights.length; i++) {
    r -= weights[i];
    if (r <= 0) return i;
  }
  return 0;
}

/** 创建下一个掉落水果 */
function prepareNextFruit() {
  if (nextFruitLevel < 0) {
    nextFruitLevel = randomSpawnLevel();
  }
  currentDropLevel = nextFruitLevel;
  nextFruitLevel = randomSpawnLevel();
}

/** 掉落当前水果 */
function dropFruit() {
  if (gameOver || paused) return;
  if (currentDropLevel < 0) return;

  const level = currentDropLevel;
  const type = FRUIT_TYPES[level];

  // 钳制 X 到合法范围
  const x = Math.max(WALL_LEFT + type[2], Math.min(WALL_RIGHT - type[2], pointerX));

  fruits.push({
    level,
    x,
    y: DROP_Y,
    vx: 0,
    vy: 1.5,
    r: type[2],
    grounded: false,
  });

  playDropSound();
  prepareNextFruit();
}

// ============================================================
// 游戏结束检测
// ============================================================
function checkGameOver() {
  for (const f of fruits) {
    // 仅当水果已静止且顶部在危险线上方时才判游戏结束
    // 正在下落穿过危险线的水果不算
    if (f.y - f.r < DANGER_Y) {
      const settled = f.grounded || (Math.abs(f.vy) < 0.5 && Math.abs(f.vx) < 0.5);
      if (settled) {
        triggerGameOver();
        return true;
      }
    }
  }
  return false;
}

function triggerGameOver() {
  gameOver = true;
  playGameOverSound();

  // 更新最高分
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('fruitmerge_high', String(highScore));
  }

  // 显示 overlay
  finalScoreEl.textContent = score;
  finalHighEl.textContent = highScore;
  if (comboCount > 1) {
    finalComboEl.textContent = `最高连击 x${comboCount}`;
  } else {
    finalComboEl.textContent = '';
  }
  overlay.classList.add('active');
}

// ============================================================
// 屏幕 shake
// ============================================================
function updateShake() {
  if (shakeIntensity > 0) {
    shakeIntensity *= 0.9;
    if (shakeIntensity < 0.3) shakeIntensity = 0;
  }
}

function applyShake() {
  if (shakeIntensity > 0) {
    const sx = (Math.random() - 0.5) * shakeIntensity;
    const sy = (Math.random() - 0.5) * shakeIntensity;
    ctx.save();
    ctx.translate(sx, sy);
    return true;
  }
  return false;
}

function endShake() {
  ctx.restore();
}

// ============================================================
// 渲染
// ============================================================

/** 绘制单个水果 (使用系统 emoji) */
function drawFruit(f, alpha) {
  const type = FRUIT_TYPES[f.level];
  if (!type) return;

  const emoji = type[1];
  const r = f.r;

  ctx.save();
  ctx.globalAlpha = alpha == null ? 1 : alpha;

  // 水果阴影/光晕
  const glow = ctx.createRadialGradient(f.x, f.y, r * 0.1, f.x, f.y, r * 1.2);
  glow.addColorStop(0, `rgba(255,255,255,0.12)`);
  glow.addColorStop(0.5, `rgba(255,255,255,0.04)`);
  glow.addColorStop(1, `rgba(255,255,255,0)`);
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(f.x, f.y, r * 1.2, 0, Math.PI * 2);
  ctx.fill();

  // 底部环境阴影
  ctx.shadowColor = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 3;

  // 用 emoji 绘制水果
  const fontSize = r * 2.2;
  ctx.font = `${fontSize}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 0;
  ctx.fillText(emoji, f.x, f.y + 1);

  ctx.restore();
}

/** 绘制危险线 */
function drawDangerLine(time) {
  const flash = Math.sin(time * 0.008) > 0.3;
  if (!flash) return;

  ctx.save();
  ctx.strokeStyle = 'rgba(255, 30, 30, 0.7)';
  ctx.lineWidth = 2.5;
  ctx.setLineDash([8, 6]);
  ctx.shadowColor = 'rgba(255, 0, 0, 0.4)';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(WALL_LEFT, DANGER_Y);
  ctx.lineTo(WALL_RIGHT, DANGER_Y);
  ctx.stroke();

  // 左右标记
  ctx.setLineDash([]);
  ctx.font = '10px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255, 50, 50, 0.5)';
  ctx.fillText('⚠', WALL_LEFT - 12, DANGER_Y + 4);
  ctx.fillText('⚠', WALL_RIGHT + 12, DANGER_Y + 4);

  ctx.restore();
}

/** 绘制 ghost 预览 */
function drawGhostPreview() {
  if (gameOver || paused) return;
  if (currentDropLevel < 0) return;

  const type = FRUIT_TYPES[currentDropLevel];
  const r = type[2];
  const x = Math.max(WALL_LEFT + r, Math.min(WALL_RIGHT - r, pointerX));

  ctx.save();

  // 垂直虚线
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 6]);
  ctx.beginPath();
  ctx.moveTo(x, DROP_Y + r);
  ctx.lineTo(x, CANVAS_H - 20);
  ctx.stroke();
  ctx.setLineDash([]);

  // 半透明 emoji
  const fontSize = r * 2.2;
  ctx.font = `${fontSize}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = 0.35;
  ctx.shadowColor = 'rgba(255,255,255,0.08)';
  ctx.shadowBlur = 6;
  ctx.fillText(type[1], x, DROP_Y);

  ctx.restore();
}

/** 绘制 next 预览 (顶部中央) */
function drawNextPreview() {
  if (nextFruitLevel < 0) return;
  const type = FRUIT_TYPES[nextFruitLevel];
  const fontSize = 26;
  ctx.save();
  ctx.font = `${fontSize}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // 轻微光晕
  ctx.shadowColor = 'rgba(255,255,255,0.1)';
  ctx.shadowBlur = 8;
  ctx.fillText(type[1], CANVAS_W / 2, 28);
  ctx.restore();
}

/** 绘制标题 (金色渐变) */
function drawTitle() {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  const grad = ctx.createLinearGradient(CANVAS_W/2 - 80, 0, CANVAS_W/2 + 80, 0);
  grad.addColorStop(0, '#ffd700');
  grad.addColorStop(0.5, '#ffec8b');
  grad.addColorStop(1, '#ffa500');
  ctx.shadowColor = 'rgba(255, 215, 0, 0.3)';
  ctx.shadowBlur = 15;

  ctx.font = `bold 26px -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif`;
  ctx.fillStyle = grad;
  ctx.fillText('水果合成大作战', CANVAS_W / 2, 42);

  // 英文副标题
  ctx.shadowBlur = 0;
  ctx.font = '9px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillText('FRUIT MERGE', CANVAS_W / 2, 72);

  ctx.restore();
}

/** 绘制分数 */
function drawScore() {
  ctx.save();
  ctx.textBaseline = 'top';

  // 分数 (左)
  ctx.textAlign = 'left';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 4;
  ctx.font = `bold 24px -apple-system, sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.fillText(`${score}`, 16, 6);

  // 分数标签
  ctx.font = '12px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText('SCORE', 16, 34);

  // 最高分 (右)
  ctx.textAlign = 'right';
  ctx.font = `bold 24px -apple-system, sans-serif`;
  ctx.fillStyle = '#ffd700';
  ctx.fillText(`${highScore}`, CANVAS_W - 16, 6);

  ctx.font = '12px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(255,215,0,0.4)';
  ctx.fillText('BEST', CANVAS_W - 16, 34);

  // combo 显示
  if (comboCount > 1 && comboTimer > 0) {
    ctx.textAlign = 'center';
    ctx.font = `bold 14px -apple-system, sans-serif`;
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = 'rgba(255, 215, 0, 0.5)';
    ctx.shadowBlur = 10;
    ctx.fillText(`COMBO x${comboCount}`, CANVAS_W / 2, 110);
  }

  ctx.restore();
}

/** 暂停提示 (按 P) */
function drawPauseHint() {
  ctx.save();
  ctx.font = '10px -apple-system, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillText('P 暂停', CANVAS_W - 14, 50);
  ctx.restore();
}

/** 暂停遮罩 */
function drawPauseOverlay() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold 36px -apple-system, 'PingFang SC', sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(255,255,255,0.2)';
  ctx.shadowBlur = 20;
  ctx.fillText('暂停', CANVAS_W / 2, CANVAS_H / 2 - 20);
  ctx.shadowBlur = 0;
  ctx.font = '16px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText('按 P 继续', CANVAS_W / 2, CANVAS_H / 2 + 30);
  ctx.restore();
}

// ============================================================
// 游戏更新循环
// ============================================================
function update() {
  if (gameOver || paused) return;

  // 物理更新 (多次子步进提高稳定性)
  const substeps = 3;
  for (let s = 0; s < substeps; s++) {
    for (const f of fruits) {
      applyGravity(f);
      updatePosition(f);
      wallCollision(f);
    }
    handleFruitCollisions();
  }

  // 更新粒子
  updateParticles();

  // 更新弹出
  updateScorePopups();

  // 更新 combo 计时
  if (comboTimer > 0) {
    comboTimer -= 16; // ~60fps
    if (comboTimer < 0) comboTimer = 0;
  }

  // 更新 shake
  updateShake();

  // 游戏结束检测 (延迟一帧让掉下来的水果落一落)
  checkGameOver();
}

// ============================================================
// 渲染循环
// ============================================================
let lastTime = 0;

function render(time) {
  if (lastTime === 0) lastTime = time;

  // 清屏
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // 背景
  const bgGrad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  bgGrad.addColorStop(0, '#14143a');
  bgGrad.addColorStop(0.3, '#0d0d28');
  bgGrad.addColorStop(1, '#060612');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // 星星
  drawStars(time);

  // 屏幕 shake
  const shaking = applyShake();

  // 危险线
  drawDangerLine(time);

  // 画水果
  for (const f of fruits) {
    drawFruit(f);
  }

  // 粒子
  drawParticles();

  // 分数弹出
  drawScorePopups();

  // Ghost 预览
  drawGhostPreview();

  // Next 预览
  drawNextPreview();

  // 标题
  drawTitle();

  // 分数
  drawScore();

  // 暂停提示
  drawPauseHint();

  if (shaking) endShake();

  // 暂停遮罩 (在所有内容之上)
  if (paused) {
    drawPauseOverlay();
  }

  // 继续循环
  requestAnimationFrame(render);
}

// ============================================================
// 主游戏循环 (update + render 分离)
// ============================================================
let lastUpdate = 0;

function gameLoop(time) {
  if (lastUpdate === 0) lastUpdate = time;
  const elapsed = time - lastUpdate;
  if (elapsed >= 16) { // ~60fps
    update();
    lastUpdate = time - (elapsed % 16);
  }

  // render 由 requestAnimationFrame 中的 render 函数驱动
}

// 启动 render
requestAnimationFrame(render);

// 启动 update 循环
function startUpdateLoop() {
  lastUpdate = 0;
  function tick(time) {
    gameLoop(time);
    if (!gameOver) {
      requestAnimationFrame(tick);
    }
  }
  requestAnimationFrame(tick);
}

// ============================================================
// 输入事件
// ============================================================

function getPointerX(clientX) {
  const coord = canvasCoords(clientX, 0);
  return coord.x;
}

// Mouse
canvas.addEventListener('mousemove', (e) => {
  pointerX = getPointerX(e.clientX);
});

canvas.addEventListener('click', (e) => {
  if (gameOver) return;
  pointerX = getPointerX(e.clientX);
  dropFruit();
});

// Touch
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameOver) return;
  const touch = e.touches[0];
  pointerX = getPointerX(touch.clientX);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  pointerX = getPointerX(touch.clientX);
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (gameOver) return;
  dropFruit();
}, { passive: false });

// ============================================================
// 键盘事件
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'p' || e.key === 'P') {
    togglePause();
  }
  if (e.key === ' ' && !gameOver) {
    e.preventDefault();
    dropFruit();
  }
});

// ============================================================
// 暂停切换
// ============================================================
function togglePause() {
  if (gameOver) return;
  paused = !paused;
  pauseBtn.textContent = paused ? '▶' : '⏸';
}

pauseBtn.addEventListener('click', togglePause);

// ============================================================
// 游戏初始化 / 重置
// ============================================================
function resetGame() {
  fruits = [];
  particles = [];
  scorePopups = [];
  score = 0;
  comboCount = 0;
  comboTimer = 0;
  lastMergeTime = 0;
  shakeIntensity = 0;
  gameOver = false;
  paused = false;
  nextFruitLevel = -1;
  currentDropLevel = -1;
  pointerX = CANVAS_W / 2;
  overlay.classList.remove('active');
  pauseBtn.textContent = '⏸';

  prepareNextFruit();
  lastUpdate = 0;
  lastTime = 0;

  // 重启 update 循环
  startUpdateLoop();
}

restartBtn.addEventListener('click', resetGame);

// ============================================================
// 启动游戏
// ============================================================
initStars();
resetGame();
</script>
